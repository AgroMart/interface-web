name: Vue Build

on:
  push:
    branches: [ "main", "devel" ]
  pull_request:
    branches: [ "main", "devel" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install
      
      - run: npm run lint
      
      - run: npm run test:coverage
      
      - run: npm run build

      - name: Validate Sonar credentials
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is empty or unavailable for this run."
            echo "Check repository secret SONAR_TOKEN (or PR from fork restrictions)."
            exit 1
          fi
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "SONAR_ORGANIZATION is empty."
            echo "Set repository variable SONAR_ORGANIZATION in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
