sonar.projectKey=AgroMart_interface-web
sonar.projectName=Agromart Interface Web
sonar.projectVersion=0.1.0
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusões
sonar.exclusions=node_modules/**,dist/**,**/*.spec.js,**/*.test.js

# JavaScript/Vue específico
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.file.suffixes=.js,.vue

# Vue files
sonar.vue.inlineTemplate=true

# Cobertura
sonar.coverage.exclusions=**/*.spec.js,**/*.test.js,src/main.js,src/plugins/**
